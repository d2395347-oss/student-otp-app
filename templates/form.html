<!DOCTYPE html>
<html>
<head>
<title>Student Registration Form</title>
<style>
    body {
        display: flex;
        justify-content: center;   /* horizontal center */
        align-items: center;       /* vertical center */
        height: 100vh;             /* full screen height */
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
    }

    form {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        width: 300px;
    }

    h2 {
        text-align: center;
    }

    input, button {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
    }

    button {
        cursor: pointer;
    }
</style>
</head>
<body>
<h2 bgcolor="Green">Student Registration</h2>

<form action="/submit" method="POST" onsubmit="return checkForm(event)">

<input type="text" name="name" placeholder="Full Name" required><br><br>
<input type="text" name="father_name" placeholder="Father Name" required><br><br>
<input type="text" name="caste" placeholder="Caste" required><br><br>

<input type="text" id="phone" name="phone" placeholder="Phone (10 digits)" required>
<button type="button" onclick="sendOTP()">Send OTP</button><br><br>

<input type="text" id="otp" placeholder="Enter OTP">
<button type="button" onclick="verifyOTP()">Verify OTP</button>

<p id="status"></p>

<input type="text" name="aadhaar" placeholder="Aadhaar (12 digits)" required><br><br>

<button type="submit">Register</button>

</form>

<script>
let otpVerified = false;

function sendOTP() {
    let phone = document.getElementById("phone").value;

    fetch("/send_otp", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: "phone=" + phone
    }).then(r => r.json()).then(d => alert(d.message));
}

function verifyOTP() {
    let phone = document.getElementById("phone").value;
    let otp = document.getElementById("otp").value;

    fetch("/verify_otp", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: "phone=" + phone + "&otp=" + otp
    }).then(r => r.json()).then(d => {
        if (d.status === "success") {
            otpVerified = true;
            document.getElementById("status").innerText = "Verified";
        } else {
            alert(d.message);
        }
    });
}

function checkForm(e) {
    if (!otpVerified) {
        alert("Verify OTP first");
        e.preventDefault();
        return false;
    }
    return true;
}
</script>

</body>
</html>
