<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Registration</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #4e73df, #1cc88a);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        width: 650px;
        background: white;
        padding: 25px 30px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    label {
        font-weight: 600;
        margin-top: 10px;
        display: block;
        color: #444;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 8px;
        border: 1px solid #ccc;
        transition: 0.3s;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #4e73df;
        box-shadow: 0 0 5px rgba(78,115,223,0.4);
        outline: none;
    }

    .row {
        display: flex;
        gap: 10px;
        margin-top: 5px;
    }

    .row input {
        flex: 1;
    }

    .radio-group {
        display: flex;
        gap: 20px;
        margin-top: 5px;
    }

    .radio-group input {
        width: auto;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: none;
        border-radius: 8px;
        background: #4e73df;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #2e59d9;
    }

    .small-btn {
        width: auto;
        padding: 8px 12px;
        font-size: 14px;
    }

    .footer-btn {
        background: #1cc88a;
    }

    .footer-btn:hover {
        background: #17a673;
    }

    #status {
        text-align: center;
        margin-top: 10px;
        font-weight: bold;
    }
</style>

</head>

<body>

<div class="container">
    <h2>STUDENT REGISTRATION FORM</h2>

    <form action="/submit" method="POST" enctype="multipart/form-data" onsubmit="checkForm(event)">

        <label>Name</label>
        <input type="text" name="name" required>

        <label>Father Name</label>
        <input type="text" name="father_name" required>
        <lebel>Date of Birth </lebel>
        <input type="text" name="date of birth" placeholder="Enter your date_of_birth as per birth certificate" required>

        <label>Address</label>
        <textarea name="address"></textarea>

        <label>Father's Occupation</label>
        <input type="text" name="occupation">

        <label>Previous Academic Year</label>
        <input type="text" name="academic_year">

        <label1>Class Applied</label1>
            <select name="Class Applying For" required>
                <option value="">Select Class Applying For</option>
            <option>Nursery</option>
            <option>LKG</option>
            <option>UKG</option>
            <option>CL-I</option>
            <option>CL-II</option>
            <option>CL-III</option>
            <option>CL-IV</option>
            <option>CL-V</option>
            <option>CL-VI</option>
            <option>CL-VII</option>
            <option>CL-VIII</option>
            <option>CL-IX</option>
            <option>CL-X</option>
            <option>CL-XI</option>
            <option>CL-XII</option>
        </select>
    

        <label>Institution Name</label>
        <input type="text" name="institution">

        <label>Category</label>
        <select name="category" required>
            <option value="">Select Category</option>
            <option>General</option>
            <option>OBC</option>
            <option>SC</option>
            <option>ST</option>
        </select>

        <label>Special Child</label>
        <div class="radio-group">
            <label><input type="radio" name="special_child" value="yes"> Yes</label>
            <label><input type="radio" name="special_child" value="no"> No</label>
        </div>

        <label>If Yes, upload Certificate (PDF)</label>
        <input type="file" name="special_file" accept="application/pdf">

        <label>Extra Curricular Activity</label>
        <div class="radio-group">
            <label><input type="radio" name="extra_activity" value="yes"> Yes</label>
            <label><input type="radio" name="extra_activity" value="no"> No</label>
        </div>

        <label>If Yes, upload Certificate (PDF)</label>
        <input type="file" name="extra_file" accept="application/pdf">

        <label>Hobbies</label>
        <input type="text" name="hobbies">

        <label>Sports</label>
        <input type="text" name="sports">

        <label>Any Achievement</label>
        <div class="radio-group">
            <label><input type="radio" name="achievement" value="yes"> Yes</label>
            <label><input type="radio" name="achievement" value="no"> No</label>
        </div>

        <label>If yes, Upload Certificate (PDF)</label>
        <input type="file" name="achievement_file" accept="application/pdf">

        <label>Mobile Number</label>
        <div class="row">
            <input type="text" id="phone" name="mobile" required>
            <button type="button" class="small-btn" onclick="sendOTP()">Send OTP</button>
        </div>

        <label>Enter OTP</label>
        <div class="row">
            <input type="text" id="otp">
            <button type="button" class="small-btn" onclick="verifyOTP()">Verify</button>
        </div>

        <p id="status"></p>

        <label>Aadhaar Number</label>
        <input type="text" name="aadhaar" placeholder = "Enter yoyr 12 digit aadhaar number" required>

        <label>PAN Number</label>
        <input type="text" name="PAN" placeholder = "Enter your PAN number" required>

        <div style="margin-top:10px;">
        <label>
        <input type="checkbox" name="declaration" required>I declare that all the information provided is true to the best of my knowledge.
        </label>
        </div>
        <button type="submit">Register</button>

    </form>

    <button class="footer-btn" onclick="viewStudents()">View All Students</button>

</div>

<script>
let otpVerified = false;

function sendOTP() {
    let phone = document.getElementById('phone').value;

    fetch('/send_otp', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'phone=' + encodeURIComponent(phone)
    })
    .then(res => res.json())
    .then(data => alert("OTP Sent"));
}

function verifyOTP() {
    let phone = document.getElementById('phone').value;
    let otp   = document.getElementById('otp').value;

    fetch('/verify_otp', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'phone=' + encodeURIComponent(phone) + '&otp=' + encodeURIComponent(otp)
    })
    .then(res => res.json())
    .then(data => {
        let status = document.getElementById('status');

        if (data.status === "success") {
            otpVerified = true;
            status.innerText = "✅ Verified";
            status.style.color = "green";
        } else {
            status.innerText = "❌ Failed";
            status.style.color = "red";
        }
    });
}

function checkForm(event) {
    if (!otpVerified) {
        alert("Verify OTP first!");
        event.preventDefault();
    }
}

function viewStudents() {
    window.location.href = "/students";
}
</script>

</body>
</html>
