<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
</head>
<body>

<h2>Registered Students</h2>

<table border="1">
<tr>
<th>Name</th>
<th>Phone</th>
<th>Category</th>
</tr>

{% for s in students %}
<tr>
  <td>{{ s[1] }}</td>
  <td>{{ s[2] }}</td>
  <td>{{ s[3] }}</td>
  <td>
    <a href="/approve/{{ s[0] }}">Approve</a>
  </td>
</tr>
</table>

</body>
</html>
